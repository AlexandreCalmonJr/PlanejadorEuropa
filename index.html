<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>EuroPlanner — Planejador Europa & Imigração</title>
    <meta name="description" content="Planejador de imigração para Europa: gestão de vistos, vagas, universidades, passagens e finanças." />
    
    <!-- PWA Web Manifest & Theme Color -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />
    
    <!-- iOS / Safari PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="EuroPlanner" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    
    <!-- Favicon SVG Europa & Aviao -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  </head>
  <body class="bg-slate-950 text-slate-100 antialiased selection:bg-teal-500 selection:text-slate-950">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Register Service Worker for PWA Offline Support -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('PWA Service Worker registrado:', reg.scope))
            .catch(err => console.log('Falha ao registrar Service Worker:', err));
        });
      }
    </script>
  </body>
</html>
